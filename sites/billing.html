<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Software</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Całkowicie białe tło wszędzie */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app-container {
            width: 350px;
            height: 550px;
            background: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 15px; }

        /* Górny szary prostokąt */
        .drop-zone {
            background-color: #e1e5e9;
            border-radius: 20px;
            height: 200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            position: relative;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .plus-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #cbd5e1;
            pointer-events: none;
        }

        /* Sekcja kart / przycisku */
        .cards-area {
            margin-top: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .card-item {
            border-radius: 12px;
            aspect-ratio: 1.58 / 1;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 2px rgba(0, 0, 0, 0.3));
        }

        .card-item img {
          width: 100%;
          object-fit: cover;
        }

        /* ZIELONY PRZYCISK - pojawia się ZAMIAST kart */
        #continue-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.4);
            animation: popIn 0.3s ease-out;
        }

        /* Widok końcowy - ptaszek */
        .success-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .success-circle {
            width: 100px; height: 100px;
            background-color: #22c55e;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden { display: none !important; }
        .invisible { opacity: 0; pointer-events: none; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="main-ui">
        <h1>Billing Software</h1>

        <div class="drop-zone" id="upper-zone">
            <div class="plus-icon" id="plus-placeholder"><i data-lucide="plus" size="48"></i></div>
        </div>

        <div class="cards-area">
            <h2 id="bills-title">Your bills</h2>

            <div class="cards-grid" id="lower-grid">
                <div class="card-item" onclick="moveCard(this)"><img src="../img/billing/card1.png"></div>
                <div class="card-item" onclick="moveCard(this)"><img src="../img/billing/card2.png"></div>
                <div class="card-item" onclick="moveCard(this)"><img src="../img/billing/card3.png"></div>
                <div class="card-item" onclick="moveCard(this)"><img src="../img/billing/card4.png"></div>
            </div>

            <button id="continue-btn" class="hidden" onclick="finish()">CONTINUE</button>
        </div>
    </div>

    <div id="success-screen" class="hidden success-view">
        <div class="success-circle">
            <i data-lucide="check" size="60" stroke-width="4"></i>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let cardsMoved = 0;

    function moveCard(cardElement) {
        const upperZone = document.getElementById('upper-zone');
        const plus = document.getElementById('plus-placeholder');

        plus.style.opacity = '0';

        // Przenoszenie do góry
        const newCard = cardElement.cloneNode(true);
        newCard.onclick = null;
        newCard.style.cursor = "default";
        upperZone.appendChild(newCard);

        // Ukrywamy kartę na dole, ale trzymamy miejsce w gridzie
        cardElement.classList.add('invisible');

        cardsMoved++;

        if (cardsMoved === 4) {
            // ZAMIANA kart na przycisk
            setTimeout(() => {
                document.getElementById('bills-title').classList.add('hidden');
                document.getElementById('lower-grid').classList.add('hidden');
                document.getElementById('continue-btn').classList.remove('hidden');
            }, 300);
        }
    }

    function finish() {
        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
