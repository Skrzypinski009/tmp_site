<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikacja Skaner</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        /* Układ horyzontalny */
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            align-items: center;
            justify-content: space-around;
        }

        /* Lewa sekcja z ikoną i paska postępu */
        .left-section {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring {
            position: absolute;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 2s linear;
            stroke: #ff69b4; /* Różowy kolor */
            stroke-linecap: round;
        }

        .icon-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            background: #333;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Prawa sekcja ze skanerem */
        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .scanner {
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            -webkit-user-drag: none;
            user-select: none;
            filter: brightness(0) invert(1);
        }

        .scanner:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        /* Emotki zielonego ptaszka */
        .checkmark {
            position: absolute;
            font-size: 45px;
            pointer-events: none;
            animation: popIn 0.5s ease-out forwards;
            z-index: 10;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Komunikat o orientacji */
        @media (orientation: portrait) {
            body::after {
                content: "Proszę obróć telefon do poziomu";
                position: fixed;
                inset: 0;
                background: #000;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-section" id="iconArea">
        <svg class="progress-ring" width="240" height="240">
            <circle
                class="progress-ring__circle"
                stroke-width="12"
                fill="transparent"
                r="110"
                cx="120"
                cy="120"
            />
        </svg>
        <div class="icon-wrapper">
            <img src="../img/medical/icon.png" alt="Ikona">
        </div>
    </div>

    <div class="right-section">
        <img src="../img/medical/scanner.png" alt="Skaner" class="scanner" id="scannerBtn">
    </div>
</div>

<script>
    const scanner = document.getElementById('scannerBtn');
    const circle = document.querySelector('.progress-ring__circle');
    const iconArea = document.getElementById('iconArea');

    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    let timer;

    function setProgress(percent) {
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = offset;
    }

    function startLoading() {
        setProgress(100);
        timer = setTimeout(() => {
            showCheckmarks();
        }, 2000); // Czas trwania ładowania paska (musi być zgodny z CSS transition)
    }

    function resetLoading() {
        clearTimeout(timer);
        setProgress(0);
    }
    function getDistance(x1, y1, x2, y2) {
        let dx = x2 - x1;
        let dy = y2 - y1;
        return Math.sqrt(dx * dx + dy * dy);
    }
function have_good_position(x, y, prev_points) {
    // Jeśli to pierwszy punkt, pozycja zawsze jest dobra
    if (prev_points.length === 0) return true;

    for (const point of prev_points) {
        // Zwiększyłem dystans do 40, żeby faktycznie nie były na sobie
        if (getDistance(x, y, point.x, point.y) < 100) {
            return false; // Za blisko któregoś z punktów
        }
    }
    return true; // Przeszło test ze wszystkimi punktami
}

function get_new_position(prev_points) {
    let attempts = 0; // Zabezpieczenie przed nieskończoną pętlą
    while(attempts < 100) {
        const angle = Math.random() * Math.PI * 2;
        const distance = 110 + Math.random() * 40;
        const x = Math.cos(angle) * distance + 110;
        const y = Math.sin(angle) * distance + 110;

        if (have_good_position(x, y, prev_points)) {
            return { x: x, y: y };
        }
        attempts++;
    }
    // Jeśli po 100 próbach nie znaleziono miejsca, zwróć cokolwiek, żeby nie zawiesić strony
    return { x: Math.random() * 200, y: Math.random() * 200 };
}

function showCheckmarks() {
    let prev_points = [];

    // Czyścimy stare ptaszki przed nowym skanowaniem
    const oldChecks = iconArea.querySelectorAll('.checkmark');
    oldChecks.forEach(el => el.remove());

    for (let i = 0; i < 3; i++) { // Zwiększyłem do 5 dla lepszego efektu
        const new_pos = get_new_position(prev_points);
        prev_points.push(new_pos); // Dodajemy obiekt z pozycją

        const check = document.createElement('span');
        check.innerText = '✅';
        check.className = 'checkmark';
        check.style.left = `${new_pos.x}px`;
        check.style.top = `${new_pos.y}px`;

        iconArea.appendChild(check);
    }
}

    // Obsługa dotyku i myszki
    scanner.addEventListener('mousedown', startLoading);
    scanner.addEventListener('mouseup', resetLoading);
    scanner.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startLoading();
    });
    scanner.addEventListener('touchend', resetLoading);

</script>

</body>
</html>
