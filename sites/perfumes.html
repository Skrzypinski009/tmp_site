<!doctype html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Perfumes</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <link rel="stylesheet" href="../styles/light-theme.css">
    <link rel="stylesheet" href="../styles/global.css">

    <style>
     body{
         background-color: pink;
     }
     #header {
         height: 50px;
     }
     .grid {
         padding-top: 100px;
     }
     .card-info {
         text-align: center;
     }
     .btn-insights {
         background-color: #ef518b;
     }
     .grid-card.selected {
         border-color: #ef518b;
         background-color: #ddd;
     }
     #truck-overlay {
         background-color: rgb(255,192,203, 0.5);
     }
    </style>

  </head>

  <body>
    <script type="text/javascript" src="../scripts/card-select.js"></script>
    <script type="text/javascript" src="../scripts/show-truck.js"></script>

    <header id='header'>
        <h1>Product Promotion</h1>
        <div class="cart-icon" onclick="openCart()">
          <img src="../img/cart.png"  alt="Cart">
          <span id="cart-count" style="display: none;">0</span>
        </div>
    </header>

    <div class="grid grid-2-cols">
        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Moschino Pink', '../img/perfumes/p1.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p1.png">
            <div class="card-info">Moschino Pink</div>
        </div>

        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Prada', '../img/perfumes/p2.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p2.png">
            <div class="card-info">Prada</div>
        </div>

        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Gucci', '../img/perfumes/p3.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p3.png">
            <div class="card-info">Gucci</div>
        </div>

        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Moschino Black', '../img/perfumes/p4.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p4.png">
            <div class="card-info">Moschino Black</div>
        </div>

        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Chanel', '../img/perfumes/p5.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p5.png">
            <div class="card-info">Chanel</div>
        </div>

        <div class="grid-card" onclick="cardSelectedWithEmoji(this, 'Valentino', '../img/perfumes/p6.png', '🩷')">
            <img class="card-img" src="../img/perfumes/p6.png">
            <div class="card-info">Valentino</div>
        </div>

    </div>

    <div id="cart-modal" class="modal-overlay" onclick="closeCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Cart</h2>
            <div id="cart-items-container"></div>
            <button class="btn-insights" onclick="showTruck()">Get insights</button>
        </div>
    </div>

    <div id="truck-overlay">
        <img src="../img/white_truck.png" class="truck-img">
    </div>
  </body>
</html>
