<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-bikes App Fix</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #333333;
            --accent-color: #007aff;
            --radius: 25px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        /* Nagłówek - Wyśrodkowany tytuł */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 75px;
            background: #222222;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .cart-btn {
            position: absolute;
            right: 20px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Lista rowerów */
        .bike-list {
            padding: 100px 16px 40px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bike-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent; /* Miejsce na podświetlenie */
            height: 250px;
        }

        /* Styl dla zaznaczonego roweru */
        .bike-card.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.3);
            transform: scale(1.02);
        }

        .bike-card img {
            margin: 0 auto;
            height: 75%;
            object-fit: cover;
            display: block;
        }

        .bike-info {
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 700;
        }

        /* Emotki ognia - Fix pozycji */
        .fire-particle {
            position: absolute;
            pointer-events: none;
            font-size: 35px;
            z-index: 9999;
            animation: fireBurst 0.8s ease-out forwards;
        }

@keyframes fireBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.5);
                opacity: 0;
            }
        }

        /* Modal - Środek ekranu */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1c1c1e;
            color: white;
            width: 85%;
            max-width: 350px;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 12px;
        }

        .cart-item img {
            width: 45px; height: 45px; border-radius: 8px; object-fit: cover;
        }

        .btn-insights {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
        }

        /* Ciężarówka - Nad wszystkim */
        #truck-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .truck-img {
            width: 160px;
            animation: truckMove 1s infinite alternate ease-in-out;
        }

        @keyframes truckMove {
            from { transform: translateX(-20px); }
            to { transform: translateX(20px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Equipment Test</h1>
        <button class="cart-btn" onclick="openCart()">🛒</button>
    </header>

    <div class="bike-list">
        <div class="bike-card" onclick="bikeSelected(this, 'Fast E bike Pro', 'bike1.png')">
            <img src="bike1.png" onerror="this.src='https://picsum.photos/seed/b1/500/300'">
            <div class="bike-info">Fast E bike pro</div>
        </div>
        <div class="bike-card" onclick="bikeSelected(this, 'Turbo Rider X', 'bike2.png')">
            <img src="bike2.png" onerror="this.src='https://picsum.photos/seed/b2/500/300'">
            <div class="bike-info">Turbo Rider X</div>
        </div>
        <div class="bike-card" onclick="bikeSelected(this, 'City Glide Plus', 'bike3.png')">
            <img src="bike3.png" onerror="this.src='https://picsum.photos/seed/b3/500/300'">
            <div class="bike-info">City Glide Plus</div>
        </div>
        <div class="bike-card" onclick="bikeSelected(this, 'Mountain Volt', 'bike4.png')">
            <img src="bike4.png" onerror="this.src='https://picsum.photos/seed/b4/500/300'">
            <div class="bike-info">Mountain Volt</div>
        </div>
        <div class="bike-card" onclick="bikeSelected(this, 'Road King E', 'bike5.png')">
            <img src="bike5.png" onerror="this.src='https://picsum.photos/seed/b5/500/300'">
            <div class="bike-info">Road King E</div>
        </div>
    </div>

    <div id="cart-modal" class="modal-overlay" onclick="closeCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Twój wybór</h2>
            <div id="cart-items-container"></div>
            <button class="btn-insights" onclick="showTruck()">Get insights</button>
        </div>
    </div>

    <div id="truck-overlay">
        <img src="truck.png" class="truck-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/713/713292.png'">
    </div>

    <script>
        const cart = [];

        function bikeSelected(element, name, img) {
            // 1. Podświetlenie
            element.classList.toggle('selected');

            // 2. Dodawanie/Usuwanie z koszyka
            const index = cart.findIndex(item => item.name === name);
            if (index === -1) {
                cart.push({ name, img });
            } else {
                cart.splice(index, 1);
            }

            // 3. Ogień (Poprawiona pozycja uwzględniająca scroll)
            const rect = element.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            for (let i = 0; i < 40; i++) {
                const fire = document.createElement('div');
                fire.className = 'fire-particle';
                fire.innerText = '🔥';

                // Obliczamy pozycję absolutną względem całej strony
                const startX = rect.left + Math.random() * rect.width;
                const startY = rect.top + scrollTop + Math.random() * rect.height;

                fire.style.left = startX + 'px';
                fire.style.top = startY + 'px';

                // Rozrzut
                const dx = (Math.random() - 0.5) * 350 + 'px';
                const dy = (Math.random() - 1) * 350 + 'px';
                fire.style.setProperty('--dx', dx);
                fire.style.setProperty('--dy', dy);

                document.body.appendChild(fire);
                fire.addEventListener('animationend', () => fire.remove());
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = "<p>Koszyk jest pusty</p>";
                return;
            }
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.img}">
                    <span>${item.name}</span>
                </div>
            `).join('');
        }

        function openCart() { document.getElementById('cart-modal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        function showTruck() {
            closeCart();
            const truck = document.getElementById('truck-overlay');
            truck.style.display = 'flex';
            setTimeout(() => { truck.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
